version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: DockerFile
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/portfolioguard
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: "postgres123"
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      ALPHAVANTAGE_API_KEY: ZJDK2NZFO6HOLR7Y
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      RISK_ENGINE_URL: http://risk-engine:5001
      SENTIMENT_SERVICE_URL: http://sentiment-service:5002
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: portfolioguard
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "postgres123"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: true

  risk-engine:
    build:
      context: ./risk-engine
      dockerfile: Dockerfile
    ports:
      - "5001:5001"
    depends_on:
      - kafka


  sentiment-service:
    build:
      context: ./sentiment-service
      dockerfile: Dockerfile
    ports:
      - "5002:5002"
    environment:
      NEWS_API_KEY: da683a63e5124cc7a33731dcdb8d8edd


volumes:
  postgres_data: